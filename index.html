<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>mytools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <div class="display-box">
        <div style="display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 15px;">
            <input type="number" id="selectY" style="width: 70px;" placeholder="年">
            <input type="number" id="selectM" style="width: 50px;" placeholder="月">
            <input type="number" id="selectD" style="width: 50px;" placeholder="日">
            <input type="time" id="selectTime" style="width: 110px;">
            <button onclick="queryCustomTime()" style="background: #e67e22;">🔍 查询</button>
        </div>
        
        <div id="gzText">点击查询获取干支</div>
        
        <div class="btn-row">
            <button class="btn-refresh" onclick="setToNow()">🔄 刷新时间</button>
            <button onclick="copyCurrent()">📋 复制时间</button>
        </div>
    </div>

    <div class="grid-buttons">
        <button class="btn-logic" onclick="copyBgText(1)">📊 全天扫描</button>
        <button class="btn-logic" onclick="copyBgText(2)">🏹 拉升止盈</button>
        <button class="btn-logic" onclick="copyBgText(3)">🚪 横盘恐慌</button>
        <button class="btn-logic" onclick="copyBgText(4)">🛡️ 趋势推演</button>
    </div>
</div>

<div class="card">
    <div class="card-title">实盘数据抓取</div>
    <div class="input-group">
        <div class="input-item">
            <label>股票代码</label>
            <input type="text" id="stockCode" placeholder="如: 600000">
        </div>
    </div>
    <div id="stockPreview" style="text-align: center; margin: 10px 0; color: #888; font-size: 13px;">输入代码后点击获取最新行情</div>
    <button class="btn-primary" style="width: 100%;" onclick="fetchAndCopyStock()">获取并一键复制</button>
</div>

<div class="card">
    <div class="card-title">24 节气查询</div>
    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
        <input type="number" id="yearInput" style="flex:1; padding: 10px; border: 1px solid #ddd; border-radius: 8px;" placeholder="输入年份">
        <button onclick="renderJieQi()">查看详情</button>
    </div>
    <div id="jqResult"></div>
</div>

<div class="card">
    <div class="card-title">随机数生成器</div>
    <div class="input-group">
        <div class="input-item">
            <label>数量</label>
            <input type="number" id="countNum" value="10">
        </div>
        <div class="input-item">
            <label>最小值</label>
            <input type="number" id="minNum" value="0">
        </div>
        <div class="input-item">
            <label>最大值</label>
            <input type="number" id="maxNum" value="100">
        </div>
    </div>
    <div style="margin: 12px 0; font-size: 0.9rem; color: #666;">
        <input type="checkbox" id="allowRepeat"> 允许生成重复数字
    </div>

    <div id="randomResult" class="result-display">等待生成...</div>

    <div class="btn-row">
        <button onclick="generateRandomNumbers()" style="flex:1; background: #4a69bd;">生成随机数</button>
        <button onclick="copyRandomResults()" style="flex:1; background: #27ae60;">一键复制</button>
    </div>
</div>

<div id="toast"></div>

<script src="dictionary.js"></script>
<script src="logic.js"></script>

</body>
</html>
